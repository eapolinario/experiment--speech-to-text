[project]
name = "experiment-text-to-speech"
version = "0.1.0"
requires-python = ">=3.13,<3.14"
dependencies = [
  "transformers>=4.40",
  "torch>=2.10",
  "sounddevice>=0.4",
  "pyannote.audio>=4.0",
  "python-dotenv>=1.0",
]

[project.optional-dependencies]
# TODO: restore diarizen extra once the package is available on PyPI
diarizen = ["soundfile"]
nemo = ["nemo_toolkit[asr]", "soundfile"]
# whisperx requires torch~=2.8 which conflicts with torch>=2.10; use backends/whisperx/ instead
# TODO: add diarizen back once it's available on PyPI
all = ["nemo_toolkit[asr]", "soundfile"]

[tool.uv]
# Exclude Windows: ctranslate2 has no cp313 Windows wheels, which blocks resolution
environments = ["sys_platform == 'linux'", "sys_platform == 'darwin'"]

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-cov>=6",
]
