[project]
name = "experiment-text-to-speech"
version = "0.1.0"
requires-python = ">=3.10,<3.14"
dependencies = [
  "transformers>=4.40",
  "torch>=2.2",
  "sounddevice>=0.4",
  "pyannote.audio>=3.1",
  "python-dotenv>=1.0",
]

[project.optional-dependencies]
# TODO: restore diarizen extra once the package is available on PyPI
diarizen = ["soundfile"]
nemo = ["nemo_toolkit[asr]", "soundfile"]
whisperx = ["whisperx"]
# TODO: add diarizen back once it's available on PyPI
all = ["nemo_toolkit[asr]", "whisperx", "soundfile"]

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-cov>=6",
]
